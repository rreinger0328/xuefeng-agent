<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>雪峰Agent</title>
<style>
body{font-family:'Microsoft YaHei',sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#1a1a1a;color:#ccc}
.box{text-align:center;max-width:500px;padding:40px}
h2{color:#e74c3c;font-size:28px}
p{line-height:2;font-size:15px}
.btn{padding:14px 40px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:700;margin-top:16px}
.btn:hover{background:#c0392b}
.ok{color:#2ecc71}
</style></head>
<body>
<div class="box" id="main">
  <div style="font-size:48px">🔍</div>
  <h2 id="status">正在检测服务器...</h2>
  <p id="msg"></p>
  <button class="btn" onclick="location.href='http://127.0.0.1:8765/'">🔄 重试</button>
</div>
<script>
fetch('http://127.0.0.1:8765/ping').then(r=>r.json()).then(d=>{
  if(d.ok){
    document.getElementById('status').innerHTML='✅ 服务器已就绪';
    document.getElementById('status').className='ok';
    document.getElementById('msg').innerHTML='即将跳转到雪峰Agent...';
    setTimeout(function(){location.href='http://127.0.0.1:8765/'},800);
  }
}).catch(function(){
  document.getElementById('status').innerHTML='❌ 服务器未启动';
  document.getElementById('msg').innerHTML='请先<b>双击 启动.bat</b>，看到黑窗口显示"数据库已加载"后，再刷新本页。<br><br>如果双击没反应：<br>1. 确认已安装Python（python.org，勾选Add to PATH）<br>2. 右键 启动.bat → 属性 → 解除锁定<br>3. 还不行就右键 启动.bat → 以管理员身份运行';
});
</script>
</body>
</html>
